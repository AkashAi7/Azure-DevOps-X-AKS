# ─── Build Template ──────────────────────────────────────────────────────────
# Reusable template: build Docker image and push to ACR
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  - name: imageName
    type: string
  - name: acrName
    type: string
  - name: acrServiceConnection
    type: string
  - name: dockerfile
    type: string
    default: 'sample-app/Dockerfile'
  - name: buildContext
    type: string
    default: 'sample-app'

jobs:
- job: BuildAndPush
  displayName: 'Build & Push ${{ parameters.imageName }}'
  steps:

  - task: Docker@2
    displayName: 'Login to ACR'
    inputs:
      command: login
      containerRegistry: '${{ parameters.acrServiceConnection }}'

  - script: |
      SHORT_SHA=$(echo "$(Build.SourceVersion)" | cut -c1-8)
      IMAGE_TAG="${SHORT_SHA}-$(Build.BuildId)"
      echo "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]${IMAGE_TAG}"
      echo "##vso[task.setvariable variable=IMAGE_TAG]${IMAGE_TAG}"
      echo "Generated tag: ${IMAGE_TAG}"
    displayName: 'Generate image tag'
    name: SetImageTag

  - task: Docker@2
    displayName: 'Build and push image to ACR'
    inputs:
      command: buildAndPush
      repository: '${{ parameters.acrName }}.azurecr.io/${{ parameters.imageName }}'
      dockerfile: '${{ parameters.dockerfile }}'
      buildContext: '${{ parameters.buildContext }}'
      tags: |
        $(IMAGE_TAG)
        latest

  - script: |
      mkdir -p $(Build.ArtifactStagingDirectory)/image-info
      echo "$(IMAGE_TAG)" > $(Build.ArtifactStagingDirectory)/image-info/image-tag.txt
    displayName: 'Save image tag'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish image-info artifact'
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)/image-info'
      artifact: 'image-info'

  - task: PublishPipelineArtifact@1
    displayName: 'Publish K8s manifests'
    inputs:
      targetPath: 'k8s'
      artifact: 'k8s-manifests'
