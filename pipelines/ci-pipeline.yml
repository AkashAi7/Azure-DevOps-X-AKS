# ============================================================================
# CI Pipeline — InventoryAPI
# Triggers on: push to main/develop, PR to main
# Stages: Install → Lint → Test → Build → Push to ACR
# ============================================================================

trigger:
  branches:
    include:
      - main
      - develop
      - feature/*
  paths:
    include:
      - sample-app/**
      - pipelines/ci-pipeline.yml

pr:
  branches:
    include:
      - main
      - develop

# ─── Variables ──────────────────────────────────────────────────────────────
variables:
  # These variable groups are created in Azure DevOps Library
  # and linked to Azure Key Vault for secret management
  - group: InventoryAPI-Common      # ACR_NAME, AKS_RESOURCE_GROUP, AKS_CLUSTER_NAME
  - group: InventoryAPI-Secrets     # ACR_PASSWORD (from Key Vault)

  # These non-secret values are defined inline
  - name: nodeVersion
    value: '22'
  - name: imageName
    value: 'inventory-api'
  - name: dockerfilePath
    value: 'sample-app/Dockerfile'
  - name: buildContext
    value: 'sample-app'

# ─── Build Agents ────────────────────────────────────────────────────────────
pool:
  name: 'Default'                  # Self-hosted agent pool

# ─── Stages ─────────────────────────────────────────────────────────────────
stages:

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 1: Validate — Install, Lint, Unit Tests
# ─────────────────────────────────────────────────────────────────────────────
- stage: Validate
  displayName: '🔍 Validate Code'
  jobs:

  - job: UnitTest
    displayName: 'Unit Tests & Coverage'
    strategy:
      matrix:
        Node20:
          nodeVersion: '20'
        Node22:
          nodeVersion: '22'
    steps:

    - task: NodeTool@0
      displayName: 'Install Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'

    - task: Cache@2
      displayName: 'Cache npm packages'
      inputs:
        key: 'npm | "$(Agent.OS)" | sample-app/package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: 'sample-app/node_modules'

    - pwsh: |
        cd sample-app
        npm ci
      displayName: 'Install dependencies'

    - pwsh: |
        cd sample-app
        npm run lint
      displayName: 'Run ESLint'
      continueOnError: false

    - pwsh: |
        cd sample-app
        New-Item -ItemType Directory -Path test-results -Force | Out-Null
        npm run test:ci
      displayName: 'Run unit tests'
      env:
        NODE_ENV: test

    - task: PublishTestResults@2
      displayName: 'Publish test results'
      condition: always()
      inputs:
        testResultsFormat: 'JUnit'
        testResultsFiles: 'sample-app/test-results/junit.xml'
        testRunTitle: 'Unit Tests - Node $(nodeVersion)'
        failTaskOnFailedTests: true

    - task: PublishCodeCoverageResults@2
      displayName: 'Publish code coverage'
      condition: succeededOrFailed()
      inputs:
        summaryFileLocation: 'sample-app/coverage/cobertura-coverage.xml'
        failIfCoverageEmpty: false

# ─────────────────────────────────────────────────────────────────────────────
# STAGE 2: Build — Docker image build + push to ACR
# Only runs if Validate stage passes AND on main/develop (not PRs)
# ─────────────────────────────────────────────────────────────────────────────
- stage: Build
  displayName: '🐳 Build & Push Image'
  dependsOn: Validate
  condition: |
    and(
      succeeded('Validate'),
      ne(variables['Build.Reason'], 'PullRequest')
    )
  jobs:

  - job: BuildImage
    displayName: 'Docker Build & Push'
    steps:

    # Generate image tag: <short-commit-sha>-<build-id>
    - pwsh: |
        $shortSha = "$(Build.SourceVersion)".Substring(0,8)
        $imageTag = "$shortSha-$(Build.BuildId)"
        Write-Host "##vso[task.setvariable variable=IMAGE_TAG;isOutput=true]$imageTag"
        Write-Host "Image tag: $imageTag"
      displayName: 'Generate image tag'
      name: SetImageTag

    - task: Docker@2
      displayName: 'Build and push Docker image'
      inputs:
        command: buildAndPush
        containerRegistry: 'ACR-ServiceConnection'
        repository: '$(imageName)'
        dockerfile: '$(dockerfilePath)'
        buildContext: '$(buildContext)'
        tags: |
          $(SetImageTag.IMAGE_TAG)
          latest
        arguments: '--build-arg APP_VERSION=$(SetImageTag.IMAGE_TAG)'

    # Publish image tag as pipeline artifact so CD stage can use it
    - pwsh: |
        New-Item -ItemType Directory -Path "$(Build.ArtifactStagingDirectory)/image-info" -Force | Out-Null
        "$(SetImageTag.IMAGE_TAG)" | Set-Content "$(Build.ArtifactStagingDirectory)/image-info/image-tag.txt"
      displayName: 'Save image tag artifact'

    - task: PublishPipelineArtifact@1
      displayName: 'Publish image info artifact'
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/image-info'
        artifact: 'image-info'
        publishLocation: 'pipeline'

    # Also publish K8s manifests as artifact
    - task: PublishPipelineArtifact@1
      displayName: 'Publish K8s manifests'
      inputs:
        targetPath: 'k8s'
        artifact: 'k8s-manifests'
        publishLocation: 'pipeline'
