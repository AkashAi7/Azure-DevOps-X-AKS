apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-demo
  namespace: workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-demo
  template:
    metadata:
      labels:
        app: workshop-demo
    spec:
      containers:
        - name: workshop-demo
          image: workshop-demo:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10