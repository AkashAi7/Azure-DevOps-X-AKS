trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: workshopacr
  containerRegistry: workshopacr.azurecr.io
  imageRepository: workshop-demo
  dockerfilePath: $(Build.SourcesDirectory)/Dockerfile
  tag: $(Build.BuildId)
  aksNamespace: workshop
  kubernetesManifestPath: $(Build.SourcesDirectory)/k8s

stages:
  - stage: Validate
    displayName: Validate
    jobs:
      - job: Test
        steps:
          - checkout: self
          - script: |
              echo "Run application build here"
              echo "Run unit tests here"
            displayName: Build and test
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: $(Build.SourcesDirectory)
              artifact: app-drop
            displayName: Publish source artifact

  - stage: Build
    displayName: Build and push container
    dependsOn: Validate
    jobs:
      - job: Container
        steps:
          - script: |
              echo "Ensure the agent is already authenticated to Azure and ACR."
              az acr build --registry $(acrName) --image $(imageRepository):$(tag) --file $(dockerfilePath) .
            displayName: Build and push image

  - stage: Deploy
    displayName: Deploy to AKS
    dependsOn: Build
    jobs:
      - deployment: DeployToAks
        displayName: Deploy application
        environment: aks-dev
        strategy:
          runOnce:
            deploy:
              steps:
                - script: |
                    echo "Ensure the agent is already connected to the target AKS cluster."
                    kubectl apply -f $(kubernetesManifestPath)/namespace.yaml
                    kubectl apply -f $(kubernetesManifestPath)/deployment.yaml
                    kubectl apply -f $(kubernetesManifestPath)/service.yaml
                    kubectl set image deployment/workshop-demo workshop-demo=$(containerRegistry)/$(imageRepository):$(tag) -n $(aksNamespace)
                    kubectl rollout status deployment/workshop-demo -n $(aksNamespace)
                  displayName: Deploy manifests