<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Workshop Nginx Demo</title>
    <style>
      body {
        margin: 0;
        font-family: Segoe UI, sans-serif;
        background: linear-gradient(135deg, #f4f8fb, #dceeff);
        color: #12344d;
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      main {
        width: min(720px, 90vw);
        padding: 2rem;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 24px 60px rgba(18, 52, 77, 0.14);
      }

      h1 {
        margin-top: 0;
        font-size: clamp(2rem, 4vw, 3.5rem);
      }

      p {
        line-height: 1.6;
        font-size: 1.05rem;
      }

      code {
        padding: 0.15rem 0.4rem;
        border-radius: 8px;
        background: #eaf3ff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Workshop Nginx Image</h1>
      <p>This page is served from a simple nginx container built by the Azure DevOps ACR sample pipeline.</p>
      <p>Use this pipeline when you want the easiest possible container example before moving to the app-specific image and AKS deployment flow.</p>
      <p>Expected image name: <code>workshop-nginx-demo</code></p>
    </main>
  </body>
</html>
