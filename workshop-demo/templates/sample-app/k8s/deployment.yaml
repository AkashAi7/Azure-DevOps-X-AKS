apiVersion: apps/v1
kind: Deployment
metadata:
  name: workshop-sample-app
  namespace: workshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: workshop-sample-app
  template:
    metadata:
      labels:
        app: workshop-sample-app
    spec:
      containers:
        - name: workshop-sample-app
          image: workshop-sample-app:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10